version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: brahmaastra-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: brahmaastra
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - brahmaastra-network

  redis:
    image: redis:7-alpine
    container_name: brahmaastra-redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - brahmaastra-network

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:

networks:
  brahmaastra-network:
    driver: bridge
